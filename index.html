<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="./src/output.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="px-6 xl:px-0 bg-[#FAF9FC] py-6 flex justify-between">
                <img src="./src/images/Brand Logo.svg" alt="Brand"/>
                <div class="hidden md:block">
                    <ul>
                        <li class="font-Manrope flex items-center gap-12">
                            <a href="./index.html" class="underline underline-offset-8 decoration-[#FED65B] hover:scale-110 transition-all duration-300 hover:underline">Shop</a>
                            <a href="#" class="hover:underline decoration-[#FED65B] underline-offset-8 hover:scale-110 transition-all duration-300">Collections</a>
                            <a href="#"class="hover:underline decoration-[#FED65B] underline-offset-8 hover:scale-110 transition-all duration-300">New Arrivals</a>
                            <a href="#"class="hover:underline decoration-[#FED65B] underline-offset-8 hover:scale-110 transition-all duration-300">Sale</a>
                        </li>
                    </ul>
                </div>
                <div class="flex items-center gap-6">
                  <form class="max-w-md mx-auto rounded-full hidden lg:block">   
                      <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only text">Search</label>
                      <div class="relative w-30 bg-[#F4F3F6]">
                          <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                           <img src="./src/images/Search-icon.svg" alt="Search-icon"/>
                          </div>
                          <input type="search" id="search" class="block w-full ps-9 bg-[#F4F3F6] border-default-medium text-heading rounded-base focus:ring-blue-400 focus:border-[#43474E] shadow-xs font-semibold text-xs placeholder:text-[#43474E] font-Inter" placeholder="Search" required />
                     </div>
                  </form>
                    <a href="#" class="transition-all hover:animate-spin duration-1000"><img src="./src/images/Heart.svg" alt="Heart-icon"/></a>
                    <a href="#" class="transition-all hover:animate-spin duration-1000"><img src="./src/images/Bag.svg" alt="Bag-icon"/></a>
                    <a href="#" class="transition-all hover:animate-spin duration-1000"><img src="./src/images/User-icon.svg" alt="User-icon"/></a>
                </div>
            </div>
        </div>
    </header>
    <section class="Hero">
        <div class="container">
            <div class="flex flex-col lg:flex-row items-center justify-center gap-12 px-6 xl:px-0 py-12">
                <div class="flex flex-col gap-5.75">
                    <h2 class="text-[#735C00] text-xs font-Inter font-bold">ESSENCE OF MINIMALISM</h2>
                    <p class="text-5xl font-bold font-Manrope">Refining the Art of<br/>Modern Living</p>
                    <p class="text-[#43474E]">Discover a curated collection where architectural<br/>precision meets effortless luxury. Designed for<br/>those who appreciate the silence of quality.</p>
                    <div class="flex flex-col sm:flex-row gap-4 text-sm sm:text-[16px]">
                        <button type="button" class="bg-[#FED65B] px-12 py-4.25 rounded-[8px] shadow-md cursor-pointer font-Manrope font-bold hover:bg-[#FED65B]/80 duration-300 hover:scale-95 transition-all w-fit">Shop The Collection</button>
                        <button type="button" class="px-12 py-4 rounded-[8px] shadow-md cursor-pointer font-Manrope font-bold border-[1.5px] border-[#000613] duration-300 hover:scale-95 transition-all w-fit">Lookbook</button>
                    </div>
                </div>
                <img src="./src/images/High-end fashion aesthetic.png" class="w-lg"/>
            </div>
        </div>
    </section>
    <script src="../path/to/flowbite/dist/flowbite.min.js"></script>
    <script src="./src/main.js"></script>
</body>
</html>
